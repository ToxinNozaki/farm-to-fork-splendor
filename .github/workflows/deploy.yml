name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: |
          bun run build
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const assetsDir = 'dist/client/assets';
          const assets = fs.readdirSync(assetsDir);
          const css = assets.find((file) => /^styles-.*\.css$/.test(file));
          const entry = assets
            .filter((file) => /^index-.*\.js$/.test(file))
            .map((file) => ({ file, size: fs.statSync(path.join(assetsDir, file)).size }))
            .sort((a, b) => b.size - a.size)[0]?.file;
          if (!css || !entry) throw new Error('Missing GitHub Pages static assets');
          const html = `<!doctype html>
          <html lang="en" class="dark">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Joseph Decuis | Luxury Wagyu Dining in Roanoke</title>
              <meta name="description" content="Reserve an intimate farm-to-table dinner at Joseph Decuis, Roanoke's luxurious American restaurant for Wagyu steaks and seasonal cuisine." />
              <script type="module" crossorigin src="./assets/${entry}"></script>
              <link rel="stylesheet" crossorigin href="./assets/${css}" />
            </head>
            <body></body>
          </html>`;
          fs.writeFileSync('dist/client/index.html', html);
          NODE
          cp dist/client/index.html dist/client/404.html
          touch dist/client/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
